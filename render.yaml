services:
  - type: web
    name: smart-attendance-backend
    env: node
    rootDir: smart_attendance/backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5050
      - key: MONGO_URI
        fromSecret: MONGO_URI
      - key: JWT_SECRET
        fromSecret: JWT_SECRET

  - type: static
    name: smart-attendance-frontend
    rootDir: smart_attendance/frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: smart-attendance-backend
          property: host

# single backend service is defined above (smart-attendance-backend).
# The frontend service remains defined below. If you want a single deployable
# backend only, you can remove the frontend block.