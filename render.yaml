services:
  - type: web
    name: smart-attendance-backend
    env: node
    rootDir: smart_attendance/backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5050
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: static
    name: smart-attendance-frontend
    rootDir: smart_attendance/frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: smart-attendance-backend
          property: host