<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin Login</h1>
            <div class="additional-links">
                <a href="index.html">Back to Home</a>
                <a href="admin-signup.html">New Admin? Sign Up</a>
            </div>
        </header>
        <main>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required class="input-field">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required class="input-field">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </main>
    </div>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            // In a real application, you would have proper authentication here.
            // For this example, we'll just redirect to the registration page.
            window.location.href = 'register.html';
        });
    </script>
</body>
</html>
