<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin Sign Up</h1>
        </header>
        <main>
            <form id="adminSignupForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required class="input-field">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required class="input-field">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required class="input-field">
                </div>
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>
            <div class="additional-links">
                <a href="admin-login.html">Already have an account? Login</a>
            </div>
        </main>
    </div>
    <script>
        document.getElementById('adminSignupForm').addEventListener('submit', function(event) {
            event.preventDefault();
            // In a real application, you would have proper validation and signup logic here.
            alert('Sign up successful! (demo)');
            window.location.href = 'admin-login.html';
        });
    </script>
</body>
</html>
